version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend

    container_name: backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  frontend:
    build: ./frontend

    container_name: frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  mongo_data: